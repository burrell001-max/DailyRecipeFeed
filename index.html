<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DailyRecipeFeed | Fresh Daily Recipes</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        }

        body {
            background-color: #faf9f6;
            color: #222222;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Top Header */
        header {
            width: 100%;
            background: #ffffff;
            display: flex;
            justify-content: center;
            border-bottom: 1px solid #e2e0d9;
        }
        .header-inner {
            width: 100%;
            max-width: 1200px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            color: #f05a28;
            font-size: 32px;
            font-weight: 900;
            letter-spacing: -1.5px;
            cursor: pointer;
            text-decoration: none;
        }
        .logo span { color: #f5a623; }
        nav { display: flex; gap: 24px; }
        nav a {
            text-decoration: none;
            color: #444444;
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            cursor: pointer;
        }
        nav a:hover { color: #f05a28; }

        /* Main Container */
        .container {
            width: 100%;
            max-width: 1200px;
            padding: 20px;
        }

        /* Section Headings */
        .section-header {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 20px;
            color: #1a1a1a;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid #e2e0d9;
            padding-bottom: 10px;
            margin-top: 20px;
        }
        .section-header span {
            color: #f05a28;
        }

        /* Search Box Bar Layout */
        .search-utility-box {
            background: #ffffff;
            border: 1px solid #dcdad1;
            padding: 25px;
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: center;
        }
        @media(max-width: 768px) { .search-utility-box { grid-template-columns: 1fr; } }
        .search-input-zone h2 {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .search-bar-wrap {
            display: flex;
            border: 1px solid #8e8c84;
        }
        .search-bar-wrap input {
            flex: 1;
            padding: 12px;
            border: none;
            font-size: 16px;
            outline: none;
        }
        .search-bar-wrap button {
            background: #f05a28;
            border: none;
            color: white;
            padding: 0 20px;
            font-size: 18px;
            cursor: pointer;
        }
        .popular-tags-zone h3 {
            font-size: 14px;
            text-transform: uppercase;
            color: #1a1a1a;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }
        .tag-pills { display: flex; flex-wrap: wrap; gap: 8px; }
        .tag-pill {
            background: #f05a28;
            color: white;
            padding: 8px 14px;
            font-size: 13px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 2px;
        }

        /* Category Navigation Ribbon */
        .category-ribbon {
            background: #ffffff;
            border: 1px solid #e2e0d9;
            padding: 15px 20px;
            margin-bottom: 35px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            overflow-x: auto;
            gap: 15px;
        }
        .category-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #333333;
            font-size: 13px;
            font-weight: 700;
            min-width: 80px;
            text-align: center;
            transition: color 0.2s;
        }
        .category-item:hover { color: #f05a28; }
        .category-icon-circle {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background-color: #fdfbf7;
            border: 1px solid #e2e0d9;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 8px;
            transition: transform 0.2s, border-color 0.2s;
        }
        .category-item:hover .category-icon-circle {
            transform: scale(1.05);
            border-color: #f05a28;
        }

        /* Premium 3-Column Card Grids */
        .standard-3-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            margin-bottom: 45px;
        }
        @media(max-width: 768px) { .standard-3-grid { grid-template-columns: 1fr; } }
        
        .premium-card {
            background: #ffffff;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            border: 1px solid #e2e0d9;
            padding-bottom: 12px;
        }
        .img-box {
            position: relative;
            width: 100%;
            aspect-ratio: 4/3;
            background: #f0f0f0;
            overflow: hidden;
        }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .heart-toggle {
            position: absolute;
            top: 12px;
            right: 12px;
            background: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.15);
            font-size: 16px;
            color: #444;
        }
        .card-details { padding: 12px; }
        .card-meta {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            color: #767676;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }
        .card-title {
            font-size: 18px;
            font-weight: 700;
            line-height: 1.3;
            color: #1a1a1a;
            margin-bottom: 6px;
        }
        .card-title:hover { text-decoration: underline; }
        .stars-row { display: flex; align-items: center; gap: 4px; font-size: 13px; color: #e67e22; margin-bottom: 4px; }
        .stars-row span { color: #767676; font-size: 12px; }

        /* Asymmetric Split Banner Layout */
        .asymmetric-banner-row {
            display: grid;
            grid-template-columns: 1fr 1.6fr;
            background: #fdfbf7;
            border: 1px solid #e2e0d9;
            margin-bottom: 45px;
        }
        @media(max-width: 850px) { .asymmetric-banner-row { grid-template-columns: 1fr; } }
        
        .banner-sidebar-list {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            border-right: 1px solid #e2e0d9;
        }
        @media(max-width: 850px) { .banner-sidebar-list { border-right: none; border-bottom: 1px solid #e2e0d9; } }
        
        .sidebar-item-link {
            display: flex;
            gap: 12px;
            text-decoration: none;
            color: inherit;
            align-items: center;
        }
        .sidebar-thumb { width: 80px; height: 60px; object-fit: cover; background: #e0e0e0; flex-shrink: 0; }
        .sidebar-text { font-size: 14px; font-weight: 700; color: #222; line-height: 1.3; }
        .sidebar-text:hover { color: #f05a28; }

        .banner-hero-display {
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .hero-banner-title { font-size: 24px; font-weight: 800; margin-top: 15px; color: #1a1a1a; }
        .hero-banner-img { width: 100%; aspect-ratio: 16/9; object-fit: cover; background: #eaeaea; }

        /* Trending Now Layout */
        .trending-highlight-title {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 25px;
            margin-top: 20px;
            background: linear-gradient(180deg, transparent 70%, #f5a623 70%);
            display: inline-block;
            padding-right: 15px;
        }
        .trending-2x2-box {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 45px;
        }
        @media(max-width: 768px) { .trending-2x2-box { grid-template-columns: 1fr; } }
        
        .trending-row-card {
            display: flex;
            gap: 16px;
            text-decoration: none;
            color: inherit;
            background: #fff;
            border: 1px solid #e2e0d9;
            padding: 10px;
        }
        .trending-img { width: 140px; height: 105px; object-fit: cover; flex-shrink: 0; background: #eaeaea; }
        .trending-info { display: flex; flex-direction: column; justify-content: center; }
        .trending-meta { font-size: 11px; font-weight: 800; color: #767676; text-transform: uppercase; margin-bottom: 4px; }
        .trending-heading { font-size: 16px; font-weight: 700; line-height: 1.3; color: #1a1a1a; }
        .trending-heading:hover { text-decoration: underline; }

        /* Horizontal Features Layout Stream */
        .horizontal-feature-stream {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 45px;
            border-top: 1px solid #e2e0d9;
            padding-top: 25px;
        }
        .feature-strip-item {
            display: flex;
            gap: 24px;
            text-decoration: none;
            color: inherit;
            align-items: center;
            background: #fff;
            border: 1px solid #e2e0d9;
            padding: 15px;
        }
        .feature-strip-img { width: 220px; height: 130px; object-fit: cover; background: #ddd; flex-shrink: 0; }
        .feature-strip-title { font-size: 20px; font-weight: 800; line-height: 1.3; text-decoration: underline; color: #1a1a1a; }

        /* MyRecipes Tray Layout Element */
        .myrecipes-tray-wrap {
            background: #f7f6f0;
            padding: 30px 20px;
            margin-bottom: 45px;
            border: 1px solid #e2e0d9;
            width: 100%;
        }
        .myrecipes-brand-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .brand-lbl { font-size: 24px; font-weight: 900; color: #e11b22; display: flex; align-items: center; gap: 4px; }
        .brand-lbl span { color: #000; }
        .myrecipes-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }
        @media(max-width: 900px) { .myrecipes-grid { grid-template-columns: repeat(2, 1fr); } }
        @media(max-width: 550px) { .myrecipes-grid { grid-template-columns: 1fr; } }
        
        .myrecipes-card {
            background: #ffffff;
            border: 1px solid #e2e0d9;
            padding: 12px;
            display: flex;
            flex-direction: column;
        }
        .overlay-badge {
            position: absolute;
            bottom: 0;
            left: 0;
            background: #fbc02d;
            color: #000;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            padding: 4px 8px;
        }
        .save-recipe-btn {
            margin-top: 12px;
            background: transparent;
            border: 1px solid #1a1a1a;
            padding: 10px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .save-recipe-btn:hover { background: #f0f0f0; }

        /* Footer Layout */
        footer {
            width: 100%;
            background: #f0ede6;
            border-top: 1px solid #dcdad1;
